<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#dc2626"/>
  
  <!-- White SOS text -->
  <text
    x="256"
    y="200"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Arial Black, sans-serif"
    font-size="120"
    font-weight="900"
    fill="white"
    letter-spacing="-4"
  >SOS</text>
  
  <!-- Road line -->
  <rect x="80" y="290" width="352" height="28" rx="14" fill="white" opacity="0.9"/>
  
  <!-- Road markings -->
  <rect x="200" y="297" width="40" height="14" rx="7" fill="#dc2626"/>
  <rect x="270" y="297" width="40" height="14" rx="7" fill="#dc2626"/>
  
  <!-- Ambulance cross symbol -->
  <rect x="224" y="330" width="64" height="64" rx="12" fill="white"/>
  <rect x="248" y="340" width="16" height="44" rx="4" fill="#dc2626"/>
  <rect x="232" y="356" width="48" height="16" rx="4" fill="#dc2626"/>
</svg>